services:
  - type: web
    name: agriwater-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -e ".[dev]"
    startCommand: cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TARIFF_PEAK
        value: "110"
      - key: TARIFF_OFFPEAK
        value: "75"
